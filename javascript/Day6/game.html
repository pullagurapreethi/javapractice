<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
</head>
<body>

    <h2>Tic Tac Toe</h2>
    <h3 id="turn">Player X Turn</h3>
    

    <div>
        <button onclick="play(0)"></button>
        <button onclick="play(1)">button</button>
        <button onclick="play(2)">button</button><br><br>
        

        <button onclick="play(3)"></button>
        <button onclick="play(4)"></button>
        <button onclick="play(5)"></button><br><br>

        <button onclick="play(6)"></button>
        <button onclick="play(7)"></button>
        <button onclick="play(8)"></button>
    </div>

    <br>
    <button onclick="resetGame()">Reset Game</button>

    <h3 id="result"></h3>

    <script src="game.js"></script>
</body>
</html>
